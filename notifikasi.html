<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Notifikasi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="notifikasi.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="logo.png" alt="Magnet" class="sidebar-logo-img" onerror="this.style.display='none'" />
      <span class="sidebar-logo-text">Magnet</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-label">Beranda</span></a>
      <a href="lowongan.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></span><span class="nav-label">Cari Lowongan</span></a>
      <a href="lamaran.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span class="nav-label">Status Lamaran</span></a>
      <a href="profil.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nav-label">Profil Saya</span></a>
    </nav>
    <button class="sidebar-logout" onclick="handleLogout()"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="nav-label">Keluar</span></button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-brand"><span class="header-brand-name">Notifikasi</span></div>
      <div class="header-actions">
        <button class="notif-read-all-btn" onclick="markAllRead()" title="Tandai semua dibaca">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
          Tandai dibaca
        </button>
      </div>
    </header>

    <div class="page-body notif-body">

      <!-- TABS -->
      <div class="notif-tabs">
        <button class="notif-tab active" data-tab="penting" onclick="setTab(this)">
          Info Penting
          <span class="notif-tab-dot" id="dot-penting"></span>
        </button>
        <button class="notif-tab" data-tab="loker" onclick="setTab(this)">
          Loker
          <span class="notif-tab-dot" id="dot-loker"></span>
        </button>
        <button class="notif-tab" data-tab="lamaran" onclick="setTab(this)">
          Lamaran
          <span class="notif-tab-dot" id="dot-lamaran"></span>
        </button>
        <button class="notif-tab" data-tab="aktivitas" onclick="setTab(this)">
          Aktivitas
          <span class="notif-tab-dot" id="dot-aktivitas"></span>
        </button>
      </div>

      <!-- LIST -->
      <div class="notif-list" id="notifList"></div>

    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="db.js"></script>
  <script src="dashboard.js"></script>
  <script src="notifikasi.js"></script>
</body>
</html>
