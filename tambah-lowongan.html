<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Magnet – Tambah Lowongan</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main class="main-content">
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" ...></svg></button>
      <div class="header-brand"><span class="header-brand-name">Tambah Lowongan</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="history.back()">← Kembali</button>
      </div>
    </header>

    <div class="page-body">
      <form id="formLowongan" style="display:flex;flex-direction:column;gap:14px;max-width:600px;margin:0 auto">
        <input type="text" id="title" placeholder="Judul Lowongan" required>
        <input type="text" id="location" placeholder="Lokasi">
        <select id="category">
          <option value="it">Teknologi</option>
          <option value="bisnis">Bisnis</option>
          <option value="desain">Desain</option>
          <!-- tambahkan pilihan lain -->
        </select>
        <textarea id="description" placeholder="Deskripsi pekerjaan" rows="5" required></textarea>
        <input type="text" id="salary" placeholder="Gaji (contoh: Rp 2.000.000 – Rp 3.000.000)">
        <input type="text" id="duration" placeholder="Durasi (3-6)">
        <input type="text" id="deadline" placeholder="Deadline (contoh: 30 Juni 2026)">
        <button type="submit" class="btn btn-primary">Publikasikan Lowongan</button>
      </form>
    </div>
  </main>
  <script type="module" src="tambah-lowongan.js"></script>
</body>
</html>
