<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Profil Perusahaan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="perusahaan.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Mag<span class="n-grad">n</span>et</div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label">Beranda</span>
      </a>

      <a href="lowongan.html" class="nav-item" data-page="lowongan">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </span>
        <span class="nav-label">Cari Lowongan</span>
      </a>

      <a href="lamaran.html" class="nav-item" data-page="lamaran">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
        <span class="nav-label">Status Lamaran</span>
        <span class="nav-badge" id="nav-lamaran-badge" style="display:none">0</span>
      </a>
      
      <a href="tersimpan.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span><span class="nav-label">Tersimpan</span></a>

      <a href="profil.html" class="nav-item" data-page="profil">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="nav-label">Profil Saya</span>
      </a>
    </nav>

    <button class="sidebar-logout" onclick="handleLogout()">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      <span class="nav-label">Keluar</span>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content pr-layout">
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-brand"><span class="header-brand-name">Profil Perusahaan</span></div>
      <!-- Username Avatar sebelum profile -->
         <span class="header-user-name" id="profileNavName">halodec</span>
      <div class="header-actions"><div class="avatar-btn" onclick="window.location.href='profil.html'" style="cursor:pointer"><span id="avatarInitial">M</span></div></div>
    </header>

    <div class="page-body">

      <!-- TOPBAR with back -->
      <div class="pr-topbar">
        <button class="pr-back-btn" onclick="history.back()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="17" height="17"><polyline points="15 18 9 12 15 6"/></svg>
          Kembali
        </button>
      </div>

      <!-- HERO BANNER -->
      <div class="pr-hero" id="prHero">
        <div class="pr-hero-bg" id="prHeroBg"></div>
        <div class="pr-hero-content">
          <div class="pr-logo" id="prLogo">?</div>
          <div class="pr-hero-info">
            <h1 class="pr-company-name" id="prName">Memuat…</h1>
            <div class="pr-rating" id="prRating"></div>
          </div>
        </div>
      </div>

      <!-- TABS -->
      <div class="pr-tabs">
        <button class="pr-tab active" data-tab="tentang" onclick="setPrTab(this)">Tentang</button>
        <button class="pr-tab" data-tab="lowongan" onclick="setPrTab(this)">Lowongan <span class="pr-tab-count" id="prJobCount">0</span></button>
        <button class="pr-tab" data-tab="reviews" onclick="setPrTab(this)">Ulasan <span class="pr-tab-count" id="prReviewCount">0</span></button>
      </div>

      <!-- TAB: TENTANG -->
      <div id="prTabTentang">

        <!-- Quick info -->
        <div class="pr-info-grid" id="prInfoGrid"></div>

        <!-- Description -->
        <div class="pr-section">
          <h3 class="pr-section-title">Tentang Perusahaan</h3>
          <p class="pr-desc" id="prDesc">—</p>
        </div>

        <!-- Culture -->
        <div class="pr-section" id="prCultureSection">
          <h3 class="pr-section-title">Budaya Kerja</h3>
          <p class="pr-culture" id="prCulture">—</p>
        </div>

        <!-- Benefits -->
        <div class="pr-section" id="prBenefitsSection">
          <h3 class="pr-section-title">Benefit & Fasilitas</h3>
          <div class="pr-benefits" id="prBenefits"></div>
        </div>

      </div>

      <!-- TAB: LOWONGAN -->
      <div id="prTabLowongan" style="display:none">
        <div class="jobs-list" id="prJobsList"></div>
      </div>

      <!-- TAB: REVIEWS -->
      <div id="prTabReviews" style="display:none"></div>

    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="db.js"></script>
  <script src="dashboard.js"></script>
  <script src="jobs-data.js"></script>
  <script src="companies-data.js"></script>
  <script src="perusahaan.js"></script>
</body>
</html>
