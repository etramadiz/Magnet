<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Hasil Pencarian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="hasil-pencarian.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Mag<span class="n-grad">n</span>et</div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label">Beranda</span>
      </a>

      <a href="lowongan.html" class="nav-item" data-page="lowongan">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </span>
        <span class="nav-label">Cari Lowongan</span>
      </a>

      <a href="lamaran.html" class="nav-item" data-page="lamaran">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
        <span class="nav-label">Status Lamaran</span>
        <span class="nav-badge" id="nav-lamaran-badge" style="display:none">0</span>
      </a>
      
      <a href="tersimpan.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span><span class="nav-label">Tersimpan</span></a>

      <a href="profil.html" class="nav-item" data-page="profil">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="nav-label">Profil Saya</span>
      </a>
    </nav>

    <button class="sidebar-logout" onclick="handleLogout()">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      <span class="nav-label">Keluar</span>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content hp-layout">

    <!-- TOP HEADER -->
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-brand"><span class="header-brand-name">Hasil Pencarian</span></div>
      <div class="header-actions"><div class="avatar-btn" onclick="window.location.href='profil.html'" style="cursor:pointer"><span id="avatarInitial">M</span></div></div>
    </header>

    <div class="page-body">

      <!-- SEARCH + FILTER TOPBAR -->
      <div class="hp-topbar">
        <button class="hp-back-btn" onclick="history.back()" title="Kembali">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="hp-search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="hp-search-input" id="hpSearchInput" placeholder="Cari lowongan…" onkeydown="if(event.key==='Enter') applySearch()" />
        </div>
        <button class="hp-filter-btn" id="filterToggle" onclick="toggleFilterPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          Filter
        </button>
      </div>

      <!-- FILTER PANEL -->
      <div class="hp-filter-panel" id="hpFilterPanel">
        <div class="hp-filter-grid">
            <div class="hp-filter-group">
            <label class="hp-fl">Tipe Magang</label>
            <select class="hp-filter-select" id="fpTipeKerja">
              <option value="">Semua Tipe</option>
              <option value="parttime">Part-time</option>
              <option value="fulltime">Full-time</option>
            </select>
          </div>
          <div class="hp-filter-group">
            <label class="hp-fl">Bidang</label>
            <select class="hp-filter-select" id="fpBidang">
              <option value="">Semua Bidang</option>
              <option value="it">Teknologi &amp; IT</option>
              <option value="desain">Desain &amp; Kreatif</option>
              <option value="bisnis">Bisnis &amp; Manajemen</option>
              <option value="keuangan">Keuangan</option>
              <option value="marketing">Marketing</option>
              <option value="riset">Riset &amp; Data</option>
            </select>
          </div>
          <div class="hp-filter-group">
            <label class="hp-fl">Mode Magang</label>
            <select class="hp-filter-select" id="fpRemote">
              <option value="">Semua</option>
              <option value="onsite">Onsite</option>
              <option value="remote">Remote</option>
              <option value="hybrid">Hybrid</option>
            </select>
          </div>
          <div class="hp-filter-group">
            <label class="hp-fl">Gaji</label>
            <select class="hp-filter-select" id="fpGaji">
              <option value="">Semua (Paid & Unpaid)</option>
              <option value="paid">Paid — Ada uang saku</option>
              <option value="unpaid">Unpaid — Tanpa uang saku</option>
            </select>
          </div>
          <div class="hp-filter-group">
            <label class="hp-fl">Durasi</label>
            <select class="hp-filter-select" id="fpDurasi">
              <option value="">Semua Durasi</option>
              <option value="1-3">1 – 3 Bulan</option>
              <option value="3-6">3 – 6 Bulan</option>
              <option value="6+">6 Bulan+</option>
            </select>
          </div>
        </div>
        <div class="hp-filter-actions">
          <button class="hp-filter-reset" onclick="resetFilters()">Reset</button>
          <button class="hp-filter-apply" onclick="applySearch()">Terapkan Filter</button>
        </div>
      </div>

      <!-- META BAR -->
      <div class="hp-meta-bar">
        <p class="hp-result-count" id="hpCount">Memuat…</p>
        <button class="hp-sort-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Terbaru
        </button>
      </div>

      <!-- ACTIVE CHIPS -->
      <div class="hp-chips" id="hpChips"></div>

      <!-- RESULTS LIST -->
      <div class="hp-list" id="hpList"></div>

    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script>window.GUEST_ALLOWED = true;</script>
  <script src="db.js"></script>
  <script src="dashboard.js"></script>
  <script src="jobs-data.js"></script>
  <script src="hasil-pencarian.js"></script>
</body>
</html>
