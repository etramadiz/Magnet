<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Status Lamaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .page-title { font-family:var(--font-display); font-size:1.4rem; font-weight:800; color:var(--text-dark); margin-bottom:4px; }
    .page-sub   { font-size:0.85rem; color:var(--text-light); margin-bottom:16px; }

    /* Tabs */
    .lm-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
    .lm-tab {
      padding:7px 18px; border-radius:999px; border:1.5px solid var(--border);
      background:var(--white); color:var(--text-mid); font-family:var(--font-body);
      font-size:0.85rem; font-weight:500; cursor:pointer; transition:all var(--transition);
    }
    .lm-tab.active { background:var(--text-dark); border-color:var(--text-dark); color:#fff; }
    .lm-tab-count {
      display:inline-flex; align-items:center; justify-content:center;
      background: var(--blue-primary); color:#fff; font-size:0.68rem; font-weight:700;
      padding:1px 6px; border-radius:999px; margin-left:4px; min-width:18px;
    }

    /* Card */
    .lm-card {
      background:var(--white); border:1.5px solid var(--border); border-radius:var(--radius);
      padding:18px 20px; display:flex; gap:14px; align-items:flex-start;
      cursor:pointer; transition:border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      animation: cardIn 0.35s ease both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .lm-card:hover { border-color:var(--purple-light); box-shadow:var(--shadow-md); transform:translateY(-2px); }

    .lm-card-logo {
      width:46px; height:46px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-weight:800; font-size:0.85rem;
      border:1.5px solid var(--border);
    }
    .lm-card-body { flex:1; min-width:0; }
    .lm-card-title   { font-family:var(--font-display); font-weight:700; font-size:0.98rem; color:var(--text-dark); margin-bottom:2px; }
    .lm-card-company { font-size:0.83rem; color:var(--text-mid); margin-bottom:8px; }
    .lm-card-meta    { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .lm-card-date    { font-size:0.75rem; color:var(--text-light); }

    /* Status badges */
    .lm-status {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 12px; border-radius:999px; font-size:0.75rem; font-weight:700;
    }
    .lm-status::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .lm-status.terkirim  { background:#EFF6FF; color:#1D4ED8; }
    .lm-status.terkirim::before  { background:#1D4ED8; }
    .lm-status.diproses  { background:#EDE9F8; color:var(--purple-mid); }
    .lm-status.diproses::before  { background:var(--purple-mid); }
    .lm-status.dilihat   { background:var(--yellow-bg); color:var(--yellow); }
    .lm-status.dilihat::before   { background:var(--yellow); }
    .lm-status.diterima  { background:var(--green-bg); color:var(--green); }
    .lm-status.diterima::before  { background:var(--green); }
    .lm-status.ditolak   { background:var(--red-bg); color:var(--red); }
    .lm-status.ditolak::before   { background:var(--red); }

    .lm-card-arrow { color:var(--text-light); flex-shrink:0; align-self:center; }
    .lm-card-arrow svg { width:16px; height:16px; display:block; }

    /* Docs indicator */
    .lm-docs { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
    .lm-doc-pill {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 8px; border-radius:6px; background:var(--bg-app);
      font-size:0.7rem; color:var(--text-light);
    }
    .lm-doc-pill svg { width:11px; height:11px; }

    /* Empty state */
    .lm-empty {
      text-align:center; padding:64px 20px; color:var(--text-light);
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .lm-empty svg    { width:56px; height:56px; opacity:0.25; display:block; }
    .lm-empty h3     { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--text-mid); }
    .lm-empty p      { font-size:0.85rem; max-width:280px; line-height:1.5; }
    .lm-empty-cta    {
      margin-top:4px; padding:10px 24px;
      background:var(--blue-primary); color:#fff; border-radius:12px;
      text-decoration:none; font-family:var(--font-display); font-weight:700; font-size:0.88rem;
      transition:background var(--transition);
    }
    .lm-empty-cta:hover { background:var(--blue-hover); }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Mag<span class="n-grad">n</span>et</div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label">Beranda</span>
      </a>

      <a href="lowongan.html" class="nav-item" data-page="lowongan">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </span>
        <span class="nav-label">Cari Lowongan</span>
      </a>

      <a href="lamaran.html" class="nav-item active" data-page="lamaran">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
        <span class="nav-label">Status Lamaran</span>
        <span class="nav-badge" id="nav-lamaran-badge" style="display:none">0</span>
      </a>
      
      <a href="tersimpan.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span><span class="nav-label">Tersimpan</span></a>

      <a href="profil.html" class="nav-item" data-page="profil">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="nav-label">Profil Saya</span>
      </a>
    </nav>

    <button class="sidebar-logout" onclick="handleLogout()">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span class="nav-label">Keluar</span>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-brand"><span class="header-brand-name">Status Lamaran</span></div>
      <!-- Username Avatar sebelum profile -->
         <span class="header-user-name" id="profileNavName">halodec</span>
      <div class="header-actions"><div class="avatar-btn" onclick="window.location.href='profil.html'" style="cursor:pointer"><span id="avatarInitial">M</span></div></div>
    </header>

    <div class="page-body">
      <p class="page-sub" id="subTitle">Memuat…</p>

      <div class="lm-tabs" id="tabsWrap">
        <button class="lm-tab active" data-tab="semua" onclick="setTab(this)">Semua</button>
        <button class="lm-tab" data-tab="terkirim"  onclick="setTab(this)">Terkirim</button>
        <button class="lm-tab" data-tab="dilihat"   onclick="setTab(this)">Dilihat</button>
        <button class="lm-tab" data-tab="diproses"  onclick="setTab(this)">Diproses</button>
        <button class="lm-tab" data-tab="diterima"  onclick="setTab(this)">Diterima</button>
        <button class="lm-tab" data-tab="ditolak"   onclick="setTab(this)">Ditolak</button>
      </div>

      <div class="jobs-list" id="lamaranList"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="db.js"></script>
  <script src="dashboard.js"></script>
  <script src="jobs-data.js"></script>
  <script>
    const STATUS_LABEL = {
      terkirim: 'Terkirim',
      diproses: 'Sedang Diproses',
      dilihat:  'Dilihat Recruiter',
      diterima: 'Diterima!',
      ditolak:  'Tidak Dilanjutkan',
    };

    let allApps  = [];
    let activeTab = 'semua';

    function setTab(el) {
      document.querySelectorAll('.lm-tab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      activeTab = el.dataset.tab;
      renderList();
    }

    function formatDate(iso) {
      const d    = new Date(iso);
      const now  = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'Hari ini';
      if (diff === 1) return 'Kemarin';
      if (diff < 7)  return diff + ' hari lalu';
      return d.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
    }

    function docPills(docs) {
      const items = [];
      if (docs?.cv)    items.push(`<span class="lm-doc-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>CV</span>`);
      if (docs?.surat)  items.push(`<span class="lm-doc-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Surat</span>`);
      if (docs?.porto || docs?.portoLink) items.push(`<span class="lm-doc-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Portofolio</span>`);
      return items.join('');
    }

    function renderList() {
      const filtered = activeTab === 'semua'
        ? allApps
        : allApps.filter(a => a.status === activeTab);

      const sub = document.getElementById('subTitle');
      if (sub) sub.textContent = filtered.length + ' lamaran ditemukan';

      const list = document.getElementById('lamaranList');
      if (!list) return;

      if (!filtered.length) {
        const msg = activeTab === 'semua'
          ? 'Kamu belum melamar lowongan manapun.'
          : `Tidak ada lamaran dengan status "${STATUS_LABEL[activeTab] || activeTab}".`;
        list.innerHTML = `
          <div class="lm-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3>${activeTab === 'semua' ? 'Belum ada lamaran' : 'Tidak ada di kategori ini'}</h3>
            <p>${msg}</p>
            ${activeTab === 'semua' ? '<a href="lowongan.html" class="lm-empty-cta">Cari Lowongan Sekarang →</a>' : ''}
          </div>`;
        return;
      }

      list.innerHTML = filtered.map((app, i) => `
        <div class="lm-card" style="animation-delay:${i*0.06}s" onclick="window.location.href='detail-lowongan.html?id=${app.jobId}'">
          <div class="lm-card-logo" style="background:${app.logoColor}18;color:${app.logoColor}">${(typeof MAGNET_JOBS !== 'undefined' && MAGNET_JOBS.find(j=>j.id===app.jobId)?.companyShort) || app.companyShort}</div>
          <div class="lm-card-body">
            <p class="lm-card-title">${app.jobTitle}</p>
            <p class="lm-card-company">${app.company}</p>
            <div class="lm-card-meta">
              <span class="lm-status ${app.status}">${STATUS_LABEL[app.status] || app.status}</span>
              <span class="lm-card-date">Dilamar ${formatDate(app.appliedAt)}</span>
            </div>
            <div class="lm-docs">${docPills(app.documents)}</div>
          </div>
          <div class="lm-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      MagnetDB.requireAuth('index.html');
      restoreSidebarState();

      const user = MagnetDB.getSession();
      if (user) {
        const av = document.getElementById('avatarInitial');
        if (av) av.textContent = user.name.charAt(0).toUpperCase();
      }

      allApps = MagnetDB.getUserApplications();

      // Update badge count
      const badge = document.getElementById('navBadge');
      if (badge && allApps.length > 0) {
        badge.textContent = allApps.length;
        badge.style.display = 'inline-flex';
      }

      renderList();
    });
  </script>
</body>
</html>
