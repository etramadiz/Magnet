<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Jelajahi Lowongan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       BACKGROUND LAYER
  ════════════════════════════════════════════ -->
  <div class="bg-layer" id="bgLayer"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- ═══════════════════════════════════════════
       PAGE: LANDING
  ════════════════════════════════════════════ -->
  <div class="page active" id="page-landing">
    <div class="split-layout">

      <!-- LEFT: Brand -->
      <div class="brand-panel">
        <div class="brand-content">
          <img src="logo.png" alt="Magnet Logo" class="brand-logo" />
          <h1 class="brand-name">Magnet</h1>
        </div>
      </div>

      <!-- RIGHT: Actions -->
      <div class="action-panel">
        <div class="action-card">
          <button class="btn btn-white" onclick="window.location.href='hasil-pencarian.html'">
            Jelajahi Lowongan
          </button>
          <button class="btn btn-primary" onclick="navigateTo('page-login')">
            Masuk
          </button>
          <p class="hint-text">
            Belum punya akun?
            <a href="#" class="link" onclick="navigateTo('page-register-type')">Daftar</a>
          </p>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       PAGE: LOGIN
  ════════════════════════════════════════════ -->
  <div class="page" id="page-login">
    <div class="split-layout reverse">

      <!-- LEFT: Brand panel -->
      <div class="brand-panel">
        <div class="brand-content">
          <img src="logo.png" alt="Magnet Logo" class="brand-logo" />
          <h1 class="brand-name">Magnet</h1>
        </div>
      </div>

      <!-- RIGHT: Login form -->
      <div class="form-panel">
        <div class="form-card">
          <button class="btn btn-outline btn-google" onclick="googleAuth()">
            <svg class="google-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Lanjutkan dengan Google
          </button>

          <div class="divider"><span>atau</span></div>

          <div class="input-group">
            <label class="input-label">Email/Nomor Telepon</label>
            <input type="text" class="input-field" placeholder=" " id="login-email" />
          </div>

          <div class="input-group">
            <label class="input-label">Kata Sandi</label>
            <div class="password-wrap">
              <input type="password" class="input-field" placeholder=" " id="login-password" />
              <button type="button" class="toggle-pw" onclick="togglePassword('login-password', this)" tabindex="-1">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <a href="#" class="link forgot-link">Lupa Kata Sandi?</a>
          </div>

          <button class="btn btn-primary btn-full" onclick="handleLogin()">
            Masuk
          </button>

          <p class="hint-text center">
            Belum punya akun?
            <a href="#" class="link" onclick="navigateTo('page-register-type')">Daftar</a>
          </p>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       PAGE: REGISTER – PILIH TIPE
  ════════════════════════════════════════════ -->
  <div class="page" id="page-register-type">
    <div class="center-layout">
      <div class="register-type-card">
        <!-- Logo besar di tengah -->
        <div class="center-logo">
          <img src="logo.png" alt="Magnet Logo" class="brand-logo large" />
          <h1 class="brand-name hero">Magnet</h1>
        </div>

        <div class="type-buttons">
          <button class="btn btn-white" onclick="navigateTo('page-register-form', 'mahasiswa')">
            Daftar Sebagai Mahasiswa
          </button>
          <button class="btn btn-primary" onclick="navigateTo('page-register-form', 'perusahaan')">
            Daftar Sebagai Perusahaan
          </button>
        </div>

        <p class="hint-text center">
          Sudah punya akun?
          <a href="#" class="link" onclick="navigateTo('page-login')">Masuk</a>
        </p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       PAGE: REGISTER FORM
  ════════════════════════════════════════════ -->
  <div class="page" id="page-register-form">
    <div class="split-layout">

      <!-- LEFT: Form -->
      <div class="form-panel">
        <div class="form-card">
          <p class="register-type-badge" id="register-type-label">Mahasiswa</p>

          <div class="input-group">
            <label class="input-label">Nama Lengkap</label>
            <input type="text" class="input-field" placeholder=" " id="reg-name" />
          </div>

          <div class="input-group">
            <label class="input-label">E-Mail</label>
            <input type="email" class="input-field" placeholder=" " id="reg-email" />
          </div>

          <div class="input-group">
            <label class="input-label">Nomor Telepon</label>
            <input type="tel" class="input-field" placeholder=" " id="reg-phone" />
          </div>

          <div class="input-group">
            <label class="input-label">Kata Sandi</label>
            <div class="password-wrap">
              <input type="password" class="input-field" placeholder=" " id="reg-password" />
              <button type="button" class="toggle-pw" onclick="togglePassword('reg-password', this)" tabindex="-1">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button class="btn btn-primary btn-full" onclick="handleRegister()">
            Daftar
          </button>

          <p class="hint-text center">
            Sudah punya akun?
            <a href="#" class="link" onclick="navigateTo('page-login')">Masuk</a>
          </p>
        </div>
      </div>

      <!-- RIGHT: Brand panel -->
      <div class="brand-panel">
        <div class="brand-content">
          <img src="logo.png" alt="Magnet Logo" class="brand-logo" />
          <h1 class="brand-name">Magnet</h1>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       TOAST NOTIFICATION
  ════════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <script src="db.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
