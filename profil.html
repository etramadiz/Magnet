<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Profil Saya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .profil-hero {
      background: linear-gradient(135deg, var(--purple-deep), var(--blue-primary));
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      color: #fff;
    }
    .profil-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: #fff;
      flex-shrink: 0; border: 3px solid rgba(255,255,255,0.35);
    }
    .profil-info { flex: 1; }
    .profil-name { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
    .profil-type { font-size: 0.82rem; opacity: 0.75; }
    .profil-email { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    .edit-btn {
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff; padding: 8px 18px; border-radius: 10px;
      font-family: var(--font-display); font-size: 0.82rem; font-weight: 700;
      cursor: pointer; transition: background var(--transition);
    }
    .edit-btn:hover { background: rgba(255,255,255,0.25); }

    .profil-progress { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .progress-label { font-family: var(--font-display); font-weight: 700; font-size: 0.92rem; color: var(--text-dark); margin-bottom: 10px; display: flex; justify-content: space-between; }
    .progress-bar { background: var(--bg-app); border-radius: 999px; height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-primary), var(--purple-mid)); border-radius: 999px; transition: width 1s ease; }
    .progress-tips { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .progress-tip {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: var(--bg-app); border-radius: 10px; font-size: 0.83rem; color: var(--text-mid); cursor: pointer;
      transition: background var(--transition);
    }
    .progress-tip:hover { background: #EDE9F8; color: var(--purple-mid); }
    .progress-tip svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--purple-light); }

    .profil-section { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .section-head h3 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }
    .section-head button { background: none; border: none; color: var(--blue-primary); font-size: 0.8rem; cursor: pointer; font-family: var(--font-body); font-weight: 600; }

    .info-row { display: flex; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-light); width: 120px; flex-shrink: 0; }
    .info-value { color: var(--text-dark); font-weight: 500; }

    .logout-section {
      background: var(--white); border: 1.5px solid #FFE0E0; border-radius: var(--radius); padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logout-section p { font-size: 0.88rem; color: var(--text-mid); }
    .btn-logout {
      background: var(--red-bg); color: var(--red); border: none;
      padding: 9px 20px; border-radius: 10px; font-family: var(--font-display);
      font-size: 0.83rem; font-weight: 700; cursor: pointer; transition: background var(--transition);
    }
    .btn-logout:hover { background: #FCA5A5; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="logo.png" alt="Magnet" class="sidebar-logo-img" onerror="this.style.display='none'" />
      <span class="sidebar-logo-text">Magnet</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-label">Beranda</span></a>
      <a href="lowongan.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></span><span class="nav-label">Cari Lowongan</span></a>
      <a href="lamaran.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></span><span class="nav-label">Status Lamaran</span><span class="nav-badge">2</span></a>
      <a href="profil.html" class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nav-label">Profil Saya</span></a>
    </nav>
    <button class="sidebar-logout" onclick="handleLogout()">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      <span class="nav-label">Keluar</span>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-brand"><span class="header-brand-name">Profil Saya</span></div>
      <div class="header-actions">
        <div class="avatar-btn"><span id="avatarInitial">M</span></div>
      </div>
    </header>

    <div class="page-body" id="profilBody">
      <!-- Rendered by JS -->
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Beranda</span></a>
    <a href="lamaran.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>Lamaran</span></a>
    <a href="lowongan.html" class="bottom-nav-item bottom-nav-center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Lowongan</span></a>
    <a href="profil.html" class="bottom-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profil</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="db.js"></script>
  <script src="dashboard.js"></script>
  <script>
    /* ── Hitung progress dari data nyata ── */
    function hitungProgress(user, profile) {
      const checks = [
        !!user.name,
        !!user.email,
        !!user.phone,
        !!(profile?.universitas),
        !!(profile?.jurusan),
        !!(profile?.semester),
        !!(profile?.skills?.length),
        !!(profile?.minat?.length),
        !!(profile?.cv),
      ];
      const filled = checks.filter(Boolean).length;
      return Math.round((filled / checks.length) * 100);
    }

    document.addEventListener('DOMContentLoaded', () => {
      MagnetDB.requireAuth('index.html');
      restoreSidebarState();
      const user = MagnetDB.getSession();
      if (!user) return;

      const profile   = MagnetDB.getProfile();
      const initial   = user.name.charAt(0).toUpperCase();
      const typeLabel = user.type === 'mahasiswa' ? 'Mahasiswa' : 'Perusahaan';
      const joinDate  = new Date(user.createdAt).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
      const pct       = hitungProgress(user, profile);

      // Progress tips: ceklis jika sudah diisi
      const tipCV     = profile?.cv;
      const tipSkill  = profile?.skills?.length > 0 && profile?.minat?.length > 0;
      const tipData   = !!(profile?.universitas && profile?.jurusan && profile?.semester);

      function tipClass(done) { return done ? 'progress-tip done' : 'progress-tip'; }
      function checkIcon(done) {
        return done
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--green)"><polyline points="20 6 9 17 4 12"/></svg>`
          : '';
      }

      // Extra profile rows
      const extraRows = profile ? `
        ${profile.universitas ? `<div class="info-row"><span class="info-label">Universitas</span><span class="info-value">${profile.universitas}</span></div>` : ''}
        ${profile.jurusan     ? `<div class="info-row"><span class="info-label">Jurusan</span><span class="info-value">${profile.jurusan}</span></div>` : ''}
        ${profile.semester    ? `<div class="info-row"><span class="info-label">Semester</span><span class="info-value">Semester ${profile.semester}</span></div>` : ''}
        ${profile.skills?.length ? `<div class="info-row"><span class="info-label">Skill</span><span class="info-value">${profile.skills.join(', ')}</span></div>` : ''}
        ${profile.minat?.length  ? `<div class="info-row"><span class="info-label">Minat</span><span class="info-value">${profile.minat.join(', ')}</span></div>` : ''}
      ` : '';

      document.getElementById('profilBody').innerHTML = `
        <div class="profil-hero">
          <div class="profil-avatar" id="profilAvatarDiv" style="${user.avatar ? 'background-image:url(\'' + user.avatar + '\');background-size:cover;background-position:center' : ''}">${user.avatar ? '' : initial}</div>
          <div class="profil-info">
            <p class="profil-name">${user.name}</p>
            <p class="profil-type">${typeLabel} · Terdaftar ${joinDate}</p>
            <p class="profil-email">${user.email}</p>
          </div>
          <button class="edit-btn" onclick="window.location.href='lengkapi-profil.html?edit=1'">Edit Profil</button>
        </div>

        <div class="profil-progress">
          <p class="progress-label">
            <span>Kelengkapan Profil</span>
            <span style="color:var(--blue-primary)" id="pctLabel">${pct}%</span>
          </p>
          <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
          <div class="progress-tips" ${pct === 100 ? 'style="display:none"' : ''}>
            <div class="${tipClass(tipCV)}" onclick="window.location.href='lengkapi-profil.html?edit=1#sect-cv'">
              ${tipCV ? checkIcon(true) : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'}
              Upload CV kamu untuk meningkatkan profil
            </div>
            <div class="${tipClass(tipData)}" onclick="window.location.href='lengkapi-profil.html?edit=1#sect-datadiri'">
              ${tipData ? checkIcon(true) : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'}
              Tambahkan pengalaman &amp; pendidikan
            </div>
            <div class="${tipClass(tipSkill)}" onclick="window.location.href='lengkapi-profil.html?edit=1#sect-skill'">
              ${tipSkill ? checkIcon(true) : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'}
              Lengkapi skill &amp; minat kamu
            </div>
          </div>
        </div>

        <div class="profil-section">
          <div class="section-head">
            <h3>Informasi Akun</h3>
            <button onclick="window.location.href='lengkapi-profil.html?edit=1'">Edit</button>
          </div>
          <div class="info-row"><span class="info-label">Nama Lengkap</span><span class="info-value">${user.name}</span></div>
          <div class="info-row"><span class="info-label">Email</span><span class="info-value">${user.email}</span></div>
          <div class="info-row"><span class="info-label">No. Telepon</span><span class="info-value">${user.phone || '–'}</span></div>
          <div class="info-row"><span class="info-label">Tipe Akun</span><span class="info-value">${typeLabel}</span></div>
          ${extraRows}
          <div class="info-row"><span class="info-label">Bergabung</span><span class="info-value">${joinDate}</span></div>
        </div>

        <div class="logout-section">
          <p>Keluar dari akun ini?</p>
          <button class="btn-logout" onclick="handleLogout()">Keluar</button>
        </div>
      `;

      // Animate progress bar
      setTimeout(() => {
        const fill = document.getElementById('pFill');
        if (fill) fill.style.width = pct + '%';
      }, 200);

      // Done tips style
      document.querySelectorAll('.progress-tip.done').forEach(el => {
        el.style.opacity = '0.5';
        el.style.textDecoration = 'line-through';
        el.style.cursor = 'default';
      });
    });
  </script>
</body>
</html>
