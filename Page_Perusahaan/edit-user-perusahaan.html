        Kembali ke Profil
      </a>

      <div class="page-title" style="margin-bottom:22px;">Edit Profil Perusahaan</div>

      <div class="edit-sections">
        <!-- Logo -->
        <div class="card edit-section">
          <div class="edit-section-header">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            Logo Perusahaan
          </div>
          <div class="divider"></div>
          <div class="logo-upload-row">
            <div class="logo-preview" id="logoPreview">K</div>
            <div class="logo-upload-info">
              <p class="logo-format">Format jpg/png. Ukuran maks. 8MB.</p>
              <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="previewLogo(event)" />
              <button class="btn btn-primary" onclick="document.getElementById('logoInput').click()">Update Logo</button>
            </div>
          </div>
        </div>

        <!-- Detail Perusahaan -->
        <div class="card edit-section">
          <div class="edit-section-header">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            Detail Perusahaan
          </div>
          <div class="divider"></div>
          <div class="form-group">
            <label class="form-label">Nama Perusahaan</label>
            <input type="text" class="form-control" id="editNama" value="PT Kreasi Digital" />
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Industri</label>
              <select class="form-control" id="editIndustri">
                <option selected>Teknologi Informasi</option>
                <option>Desain Kreatif</option>
                <option>Pemasaran Digital</option>
                <option>Keuangan</option>
                <option>Pendidikan</option>
                <option>Kesehatan</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Ukuran Karyawan</label>
              <select class="form-control" id="editUkuran">
                <option>1–10 karyawan</option>
                <option>11–50 karyawan</option>
                <option selected>50–100 karyawan</option>
                <option>100–500 karyawan</option>
                <option>500+ karyawan</option>
              </select>
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Lokasi Perusahaan</label>
              <input type="text" class="form-control" id="editLokasi" value="Semarang, Jawa Tengah" />
            </div>
            <div class="form-group">
              <label class="form-label">Website</label>
              <input type="url" class="form-control" id="editWebsite" value="https://kreasidigital.co.id" />
            </div>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Alamat Perusahaan</label>
              <input type="text" class="form-control" id="editAlamat" value="Jl. Pemuda No.123, Semarang" />
            </div>
            <div class="form-group">
              <label class="form-label">Berdiri Sejak</label>
              <input type="number" class="form-control" id="editTahun" value="2018" min="1900" max="2025" />
            </div>
          </div>
        </div>

        <!-- Deskripsi -->
        <div class="card edit-section">
          <h2 class="section-title">Deskripsi Perusahaan</h2>
          <textarea class="form-control" id="editDeskripsi" rows="5">PT Kreasi Digital adalah perusahaan teknologi yang bergerak di bidang pengembangan aplikasi mobile dan web. Kami berdedikasi untuk menciptakan solusi digital inovatif yang membantu bisnis berkembang di era transformasi digital.</textarea>
        </div>

        <!-- Budaya Kerja -->
        <div class="card edit-section">
          <h2 class="section-title">Budaya Kerja</h2>
          <textarea class="form-control" id="editBudaya" rows="4">Kami percaya pada budaya kerja yang kolaboratif, inovatif, dan inklusif. Setiap anggota tim dihargai kontribusinya dan didorong untuk terus belajar dan berkembang.</textarea>
        </div>

        <!-- Benefit -->
        <div class="card edit-section">
          <h2 class="section-title">Benefit &amp; Fasilitas</h2>
          <textarea class="form-control" id="editBenefit" rows="4">Uang saku kompetitif, mentoring langsung oleh senior developer, akses ke tools premium, sertifikat magang, flexible working hours, dan kesempatan untuk diangkat menjadi karyawan tetap.</textarea>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <a href="user-perusahaan.html" class="btn btn-outline">Batalkan</a>
          <button class="btn btn-primary" onclick="saveProfile()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
            Simpan Perubahan
          </button>
        </div>
      </div>
    </main>
  </div>
