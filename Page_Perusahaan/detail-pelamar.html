<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Detail Pelamar</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="detail-pelamar.css" />
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Mag<span class="n-grad">n</span>et</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        Beranda
      </a>
      <a href="lihat-pelamar.html" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
        Lihat Pelamar
      </a>
      <a href="user-perusahaan.html">
        <span class="side-nav a svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="sidebar-label">Profile Perusahaan</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="sidebar-logout" onclick="handleLogout(); return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Keluar</span>
      </a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content" id="mainContent">
    <header class="navbar">
      <button class="navbar-toggle" id="sidebarToggle">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <a href="dashboard.html" class="navbar-brand">Mag<span class="n-grad">n</span>et</a>
      <div class="navbar-space"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <a href="notifikasi-perusahaan.html" class="navbar-bell" style="display: flex; align-items: center; justify-content: center; text-decoration: none; color: inherit;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/>
            </svg>
          </a>
        <a href="user-perusahaan.html" class="navbar-user">
          <div class="user-avatar"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg></div>
          <span id="navUserName">Perusahaan</span>
        </a>
      </div>
    </header>

    <main class="page-content">
      <a href="lihat-pelamar.html" class="btn-back">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
        Kembali ke Daftar Pelamar
      </a>

      <div class="card detail-card">
        <div class="detail-header">
          <div class="detail-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
          </div>
          <div>
            <h2 class="detail-name" id="detailName">Nama Pelamar</h2>
          </div>
        </div>

        <div class="divider"></div>

        <div class="detail-fields">
          <div class="detail-field">
            <label class="detail-label">Universitas</label>
            <div class="detail-value-box" id="universitas">Universitas Negeri Semarang</div>
          </div>
          <div class="detail-field">
            <label class="detail-label">Jurusan</label>
            <div class="detail-value-box" id="jurusan">Teknik Informatika</div>
          </div>
          <div class="detail-field">
            <label class="detail-label">Status Mahasiswa</label>
            <div class="detail-value-box" id="statusMhs">Semester 6</div>
          </div>
          
          <div class="detail-field">
            <label class="detail-label">CV</label>
            <div class="detail-file-box" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <div style="display: flex; align-items: center; gap: 10px;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width: 20px; height: 20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
                <span id="cvName">CV_Nama_Pelamar.pdf</span>
              </div>
              <div style="display: flex; gap: 8px;">
                <a id="btnCvsPreview" href="#" target="_blank" class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; text-decoration: none;">👁️ Buka</a>
                <a id="btnCvsDownload" href="#" download class="btn btn-primary" style="padding: 4px 10px; font-size: 12px; text-decoration: none;">📥 Unduh</a>
              </div>
            </div>
          </div>

          <div class="detail-field">
            <label class="detail-label">Surat Pengantar Kampus</label>
            <div class="detail-file-box" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <div style="display: flex; align-items: center; gap: 10px;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width: 20px; height: 20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
                <span id="suratName">Surat_Pengantar_Kampus.pdf</span>
              </div>
              <div style="display: flex; gap: 8px;">
                <a id="btnSuratPreview" href="#" target="_blank" class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; text-decoration: none;">👁️ Buka</a>
                <a id="btnSuratDownload" href="#" download class="btn btn-primary" style="padding: 4px 10px; font-size: 12px; text-decoration: none;">📥 Unduh</a>
              </div>
            </div>
          </div>

          <div class="detail-field">
            <label class="detail-label">Portofolio</label>
            <div class="detail-file-box" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <div style="display: flex; align-items: center; gap: 10px;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width: 20px; height: 20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
                <span id="portoName">Portofolio.pdf / Link</span>
              </div>
              <div style="display: flex; gap: 8px;">
                <a id="btnPortoAction" href="#" target="_blank" class="btn btn-primary" style="padding: 4px 10px; font-size: 12px; text-decoration: none;">🔗 Buka Link</a>
              </div>
            </div>
          </div>
          
          <div class="detail-field">
            <label class="detail-label">Catatan</label>
            <textarea class="form-control" id="catatan" rows="3" placeholder="Tambahkan catatan..."></textarea>
          </div>
        </div>
      </div>

      <div class="detail-actions">
        <button class="btn btn-success" onclick="updateStatus('Diterima')">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
          Terima
        </button>
        <button class="btn btn-danger" onclick="updateStatus('Ditolak')">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
          Tolak
        </button>
        <a href="lihat-pelamar.html" class="btn btn-outline">Batalkan</a>
      </div>
    </main>
  </div>
</div>


<script src="db.js"></script>
<script src="sidebar.js"></script>
<script src="detail-pelamar.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => { MagnetDB.requirePerusahaanAuth(); });
</script>
</body>
</html>
