<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Cari Lowongan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="lowongan.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="logo.png" alt="Magnet" class="sidebar-logo-img" onerror="this.style.display='none'" />
      <span class="sidebar-logo-text">Magnet</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="nav-label">Beranda</span>
      </a>
      <a href="lowongan.html" class="nav-item active">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></span>
        <span class="nav-label">Cari Lowongan</span>
      </a>
      <a href="lamaran.html" class="nav-item" id="nav-lamaran">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
        <span class="nav-label">Status Lamaran</span>
        <span class="nav-badge">2</span>
      </a>
      <a href="profil.html" class="nav-item" id="nav-profil">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <span class="nav-label">Profil Saya</span>
      </a>
    </nav>
    <button class="sidebar-logout" onclick="handleLogout()">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      <span class="nav-label">Keluar</span>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <header class="top-header">
      <button class="hamburger-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-brand"><span class="header-brand-name">Cari Lowongan</span></div>
      <div class="header-actions">
        <div class="avatar-btn" onclick="window.location.href='profil.html'" style="cursor:pointer"><span id="avatarInitial">M</span></div>
      </div>
    </header>

    <div class="page-body lw-body">
      <div class="lw-search-panel">

        <!-- Title -->
        <div class="lw-search-title">
          <h2>Temukan Lowongan Magang</h2>
          <p>Cari berdasarkan posisi, perusahaan, atau bidang</p>
        </div>

        <!-- APA -->
        <div class="lw-field-group">
          <p class="lw-field-group-label">Apa?</p>
          <div class="lw-field-2col">
            <div class="lw-search-field">
              <svg class="lw-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="kwKeyword" class="lw-input" placeholder="Posisi atau nama perusahaan"
                oninput="onSearchInput()" onkeydown="if(event.key==='Enter') doSearch()" />
              <button class="lw-clear-field" id="clearKwKeyword" onclick="clearField('kwKeyword')" style="display:none">✕</button>
            </div>
            <div class="lw-search-field">
              <svg class="lw-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              <select id="kwBidang" class="lw-input lw-select">
                <option value="">Semua Bidang</option>
                <option value="it">Teknologi &amp; IT</option>
                <option value="desain">Desain &amp; Kreatif</option>
                <option value="bisnis">Bisnis &amp; Manajemen</option>
                <option value="keuangan">Keuangan &amp; Akuntansi</option>
                <option value="marketing">Marketing &amp; Komunikasi</option>
                <option value="riset">Riset &amp; Data</option>
              </select>
            </div>
          </div>
        </div>

        <!-- DI MANA -->
        <div class="lw-field-group">
          <p class="lw-field-group-label">Di mana?</p>
          <div class="lw-search-field">
            <svg class="lw-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <input type="text" id="kwLokasi" class="lw-input" placeholder="Kota atau provinsi (kosong = semua)"
              oninput="onSearchInput()" onkeydown="if(event.key==='Enter') doSearch()" />
            <button class="lw-clear-field" id="clearKwLokasi" onclick="clearField('kwLokasi')" style="display:none">✕</button>
          </div>
        </div>

        <!-- FILTER SELECTS (4 baris) -->
        <div class="lw-filter-selects">

          <div class="lw-filter-select-row">
            <div class="lw-filter-select-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <select class="lw-filter-native" id="fsTipeKerja">
              <option value="">Semua Tipe Kerja</option>
              <option value="magang">Magang</option>
              <option value="parttime">Part-time</option>
              <option value="fulltime">Full-time</option>
            </select>
            <svg class="lw-select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <div class="lw-filter-select-row">
            <div class="lw-filter-select-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <select class="lw-filter-native" id="fsRemote">
              <option value="">Semua Mode Kerja</option>
              <option value="onsite">Onsite</option>
              <option value="remote">Remote</option>
              <option value="hybrid">Hybrid</option>
            </select>
            <svg class="lw-select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <div class="lw-filter-select-row">
            <div class="lw-filter-select-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <select class="lw-filter-native" id="fsGaji">
              <option value="">Semua (Paid & Unpaid)</option>
              <option value="paid">Paid — Ada uang saku</option>
              <option value="unpaid">Unpaid — Tanpa uang saku</option>
            </select>
            <svg class="lw-select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <div class="lw-filter-select-row">
            <div class="lw-filter-select-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <select class="lw-filter-native" id="fsDurasi">
              <option value="">Semua Durasi Magang</option>
              <option value="1-3">1 – 3 Bulan</option>
              <option value="3-6">3 – 6 Bulan</option>
              <option value="6+">6 Bulan ke atas</option>
            </select>
            <svg class="lw-select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

        </div>

        <!-- CARI BUTTON -->
        <button class="lw-seek-btn" onclick="doSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          CARI
        </button>

        <!-- LAST SEARCH -->
        <div class="lw-last-search" id="lastSearchWrap" style="display:none">
          <p class="lw-last-label">Pencarian terakhir</p>
          <div class="lw-last-item" onclick="rerunLastSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            <span id="lastSearchText">—</span>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script>window.GUEST_ALLOWED = true;</script>
  <script type="module"src="db.js"></script>
  <script type="module" src="dashboard.js"></script>
  <script type="module" src="lowongan.js"></script>
</body>
</html>
