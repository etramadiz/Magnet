<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Daftar Mahasiswa</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

<div class="auth-layout">

  <!-- KIRI: Form -->
  <div class="auth-form-side">
    <div class="auth-form-wrap">
      <span class="auth-logo">Mag<span class="n-grad">n</span>et</span>
      <span class="auth-badge mahasiswa">Mahasiswa</span>
      <h1 class="auth-title">Daftar Mahasiswa</h1>
      <p class="auth-sub">Buat akun untuk mulai mencari dan melamar magang impianmu.</p>

      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" id="regNama" placeholder="Nama lengkap kamu" />
      </div>

      <div class="form-group">
        <label class="form-label">E-Mail</label>
        <input type="email" class="form-control" id="regEmail" placeholder="email@contoh.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Nomor Telepon</label>
        <input type="tel" class="form-control" id="regPhone" placeholder="08xxxxxxxxxx" />
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Universitas</label>
          <input type="text" class="form-control" id="regUniversitas" placeholder="Nama universitas" />
        </div>
        <div class="form-group">
          <label class="form-label">Semester</label>
          <select class="form-control" id="regSemester">
            <option value="">Pilih</option>
            <option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Program Studi / Jurusan</label>
        <input type="text" class="form-control" id="regJurusan" placeholder="Contoh: Teknik Informatika" />
      </div>

      <div class="form-group">
        <label class="form-label">Kata Sandi</label>
        <div class="password-wrap">
          <input type="password" class="form-control" id="regPassword" placeholder="Minimal 6 karakter" />
          <button type="button" class="password-toggle" onclick="togglePw('regPassword', this)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary auth-btn" onclick="handleRegister()">Daftar</button>

      <p class="auth-hint">Sudah punya akun? <a href="login-mahasiswa.html">Masuk</a></p>
      <p class="auth-hint" style="margin-top:6px">
        <a href="pilih-daftar.html" style="font-size:13px;color:#9090B0;text-decoration:none;font-weight:600">← Kembali</a>
      </p>
    </div>
  </div>

  <!-- KANAN: Brand -->
  <div class="auth-brand-side">
    <div class="auth-brand-content">
      <div class="brand-icon-img">
        <img src="../Assets/logo.png" alt="Magnet" class="brand-logo-img" onerror="this.style.display='none'" />
      </div>
      <div class="brand-logo-text">Magnet</div>
      <p class="brand-tagline">Temukan magang impianmu dan mulai perjalanan karirmu bersama Magnet.</p>
    </div>
  </div>

</div>

<div class="toast" id="auth-toast"></div>
<script src="db.js"></script>
<script src="auth.js"></script>
<script type="module">
  import { firebaseRegister, checkSessionAndRedirect } from './auth-firebase.js';
  checkSessionAndRedirect();

  window.handleRegister = async () => {
    const name = document.getElementById('regNama').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value.trim();

    if (!name || !email || !phone || !password) {
      alert('Semua field harus diisi');
      return;
    }
    const success = await firebaseRegister({ name, email, phone, password }, 'mahasiswa');
    if (success) {
      setTimeout(() => window.location.href = 'login-mahasiswa.html', 1500);
    }
  };
</script>
</body>
</html>
