<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Masuk Perusahaan</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

<div class="auth-layout">

  <!-- KIRI: Form -->
  <div class="auth-form-side">
    <div class="auth-form-wrap">
      <span class="auth-logo">Mag<span class="n-grad">n</span>et</span>
      <span class="auth-badge perusahaan">Perusahaan</span>
      <h1 class="auth-title">Masuk ke Akun</h1>
      <p class="auth-sub">Masukkan email dan kata sandi perusahaan untuk melanjutkan.</p>

      <button class="btn btn-outline btn-google btn-full" onclick="googleAuth()">
        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Lanjutkan dengan Google
      </button>

      <div class="auth-divider"><span>atau</span></div>
      
      <div class="form-group">
        <label class="form-label">Email Perusahaan</label>
        <input type="email" class="form-control" id="loginEmail" placeholder="email@perusahaan.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Kata Sandi</label>
        <div class="password-wrap">
          <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan kata sandi" />
          <button type="button" class="password-toggle" onclick="togglePw('loginPassword', this)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
          </button>
        </div>
        <div class="auth-links-row">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" /> Ingat Saya
            </label>
            <a href="forgot-password.html?role=perusahaan">Lupa Kata Sandi?</a>
          </div>
      </div>

      <button class="btn btn-primary auth-btn" onclick="handleLogin()">Masuk</button>

      <p class="auth-hint">Belum punya akun? <a href="register-perusahaan.html">Daftar Perusahaan</a></p>
      <p class="auth-hint" style="margin-top:6px">
        <a href="pilih-login.html" style="font-size:13px;color:#9090B0;text-decoration:none;font-weight:600">← Kembali</a>
      </p>
    </div>
  </div>

  <!-- KANAN: Brand -->
  <div class="auth-brand-side">
    <div class="auth-brand-content">
      <div class="brand-icon-img">
        <img src="../Assets/logo.png" alt="Magnet" class="brand-logo-img" onerror="this.style.display='none'" />
      </div>
      <div class="brand-logo-text">Magnet</div>
      <p class="brand-tagline">Rekrut talenta magang terbaik dan kelola proses rekrutmen dengan mudah.</p>
    </div>
  </div>

</div>

<div class="toast" id="auth-toast"></div>
<script src="db.js"></script>
<script src="auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', checkExistingSession);

  function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!email)    { showToast('Masukkan email perusahaan.', 'error'); shakeInput('loginEmail');    return; }
    if (!password) { showToast('Masukkan kata sandi.', 'error');       shakeInput('loginPassword'); return; }

    const result = MagnetDB.login(email, password);
    if (!result.ok) { showToast(result.message, 'error'); shakeInput('loginEmail'); shakeInput('loginPassword'); return; }

    if (result.user.type !== 'perusahaan') {
      showToast('Akun ini bukan akun perusahaan.', 'error'); return;
    }

    showToast(`Halo, ${result.user.name}! Mengalihkan…`, 'success');
    setTimeout(() => window.location.href = '../Page_Perusahaan/dashboard.html', 1000);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
