<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet – Pilih Akun</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

<div class="center-layout">
  <div class="center-card">

    <div class="center-logo-wrap">
      <div class="center-logo-text" style="color:#fff;font-family:'Poppins',sans-serif;font-weight:800">Mag<span class="n-grad">n</span>et</div>
    </div>

    <p class="center-heading">Masuk sebagai</p>

    <div class="type-options">

      <a href="login-mahasiswa.html" class="type-card">
        <div class="type-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <div class="type-card-text">
          <span class="type-card-title">Mahasiswa</span>
          <span class="type-card-sub">Akses lamaran dan lowongan magang</span>
        </div>
        <div class="type-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a href="login-perusahaan.html" class="type-card" style="border-color:rgba(99,179,237,0.3)">
        <div class="type-card-icon" style="background:rgba(29,59,209,0.2)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="type-card-text">
          <span class="type-card-title">Perusahaan</span>
          <span class="type-card-sub">Kelola lowongan dan pelamar</span>
        </div>
        <div class="type-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

    </div>

    <p class="auth-hint auth-hint-light">Belum punya akun? <a href="pilih-daftar.html">Daftar</a></p>
    <a href="index.html" class="auth-back">← Kembali</a>

  </div>
</div>

<div class="toast" id="auth-toast"></div>
<script src="db.js"></script>
<script src="auth.js"></script>
<script>document.addEventListener('DOMContentLoaded', checkExistingSession);</script>
</body>
</html>
